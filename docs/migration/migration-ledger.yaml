      "capability_id": "lottery.prediction.generate",
      "phase": "MIGRATING",
      "pr": "https://github.com/kelvinhuang0327/MathStatisticalAnalysis/pull/12",
      "parity_evidence": "tests/unit/test_biglotto_selected_adapters.py",
      "legacy_retirement_condition": "Semantics and causal-history goldens pass per generator.",
      "implementation_state": "IMPLEMENTED_PENDING_REVIEW",
      "production_state": "NOT_CUTOVER_READY",
      "compatibility_condition": "Keep legacy generation available until remaining generators, deployment, and traffic cutover are separately verified. Three target-native CLI strategies (biglotto_zone_split_3bet_bet1, biglotto_social_wisdom_anti_popularity, biglotto_deviation_2bet) remain ONLINE/executable through the generate-bet CLI vertical. P604B adds a bounded, DB-free POST /api/v1/generate-bet HTTP execution endpoint for the same three strategies, reusing the production catalog, ExecutableRegistry, and GenerateOneBet use case; it is intended for the existing localhost local-runtime controller only. No frontend UI consumption, authentication system, deployment, or traffic cutover is claimed.",
      "rollback_condition": "Reverting the P603A target commits removes biglotto_deviation_2bet and restores the P602B two-strategy CLI state (biglotto_zone_split_3bet_bet1 and biglotto_social_wisdom_anti_popularity only); the P601B/P602B adapter port, ExecutableRegistry mechanism, and CLI behavior remain unchanged. Reverting the P604B merge commit removes POST /api/v1/generate-bet and its local-runtime allowlist entry, restoring the previous exact OpenAPI surface; the CLI vertical and all three strategies are unaffected.",
      "donor_oid": "520c3922a7c8f47e5b6196fb4b0d54716fa5fd9f",
      "migrated_strategy_ids": ["biglotto_zone_split_3bet_bet1", "biglotto_social_wisdom_anti_popularity", "biglotto_deviation_2bet"],
      "notes": "P601B migrated two selected adapters into an internal DB-free callable (OBSERVATION, non-executable). P602B (branch codex/p602b-biglotto-cli-execution-vertical) promotes both to ONLINE/executable and adds a thin `lottolab generate-bet` CLI command that resolves them through the production ExecutableRegistry and GenerateOneBet use case for deterministic, offline, machine-readable single-bet output. No HTTP route, frontend, or deployment change; API and Strategy Catalog contract tests updated to reflect the new ONLINE/executable descriptors. The CLI's `--seed` value is caller-provided bookkeeping metadata only, echoed in the output and never threaded into donor-replay execution or generated numbers. P603A (branch codex/p603a-biglotto-deviation-cli-migration) migrates biglotto_deviation_2bet as a third target-native, DB-free, deterministic adapter appended to the existing catalog and executed through the same already-merged generate-bet CLI vertical; no CLI syntax change; no HTTP route, frontend, or deployment change. P604B (branch codex/p604b-bounded-http-generate-bet) adds one bounded HTTP execution endpoint, POST /api/v1/generate-bet, reusing the existing production catalog, ExecutableRegistry, GenerateOneBet use case, and target-native BetAdapters with no second execution registry and no duplicated strategy algorithms; the request's `seed` is caller bookkeeping metadata only, echoed verbatim and never passed into execution; every closed application result (OK, REJECTED, INSUFFICIENT_HISTORY, STRATEGY_UNAVAILABLE, INVALID_OUTPUT, REPLAY_ERROR) is returned as HTTP 200, with sanitized HTTP 422 reserved for transport-level request validation failures; the endpoint is DB/data-path free; the local-runtime OpenAPI guard's forbidden-word screen carries exactly one narrow exception for this path, and the exact-approved-operation-set check remains load-bearing. Intended for the existing localhost local-runtime controller; no frontend UI consumption, authentication, deployment, or traffic cutover is claimed. P605C (branch codex/p605c-live-zone-split-core-port) ports only the core semantics of the legacy live Zone Split callable (`lottery_api/models/zone_split.py`, `ZoneSplitStrategy.generate_bets`/`get_zone_split_predictor`) as a standalone, dependency-free internal module (`lottolab.strategies.live.biglotto_zone_split`), preserving its no-history, multi-bet, nondeterministic-by-default semantics with an injectable sampler/RNG seam for tests. It is distinct from the deterministic, catalog-registered `biglotto_zone_split_3bet_bet1` strategy; shared zone geometry does not imply behavioral equivalence. Nothing here is registered in production_catalog or ExecutableRegistry, or reachable via CLI, HTTP, or frontend; no catalog, CLI, HTTP, frontend, or cutover claim is made. Future promotion to an executable strategy requires a separate application-contract decision. P605C Draft PR: https://github.com/kelvinhuang0327/MathStatisticalAnalysis/pull/14. P605D selected a separate multi-bet application boundary for the P605C core rather than reusing GenerateOneBet. P605E (branch codex/p605e-live-zone-split-use-case) adds only an application callable, `lottolab.application.use_cases.generate_live_zone_split_bets.GenerateLiveZoneSplitBets`, composing the P605C core behind a closed status/reason-code result; its request contains only `num_bets`, with history, strategy_id, lottery_type, and any caller-facing seed absent. Randomness injection remains internal to the composed core (production calls use a fresh, unseeded per-call `random.Random`; tests inject a deterministic generator via constructor injection). No catalog, ExecutableRegistry, CLI, HTTP, OpenAPI, frontend, or cutover claim is made by P605E. Future transport exposure and catalog/registry promotion remain separate Owner decisions. P605E Draft PR: https://github.com/kelvinhuang0327/MathStatisticalAnalysis/pull/16. P605F (branch codex/p605f-live-zone-split-http) exposes the P605E application callable, `GenerateLiveZoneSplitBets`, through one separate, local-only HTTP endpoint, POST /api/v1/live-zone-split-bets, distinct from and never routing through POST /api/v1/generate-bet or GenerateOneBet; the request contains only `num_bets`, with no history, seed, strategy_id, lottery_type, or sampler field. Every closed application outcome (OK, INVALID_REQUEST, INVALID_OUTPUT, EXECUTION_ERROR) is returned as HTTP 200, with sanitized HTTP 422 reserved for transport-level request validation failures; the endpoint is DB/data-path free, composes no catalog/registry/infrastructure dependency, and default composition uses `build_production_generate_live_zone_split_bets()`. The local-runtime OpenAPI guard's forbidden-word screen keeps exactly one narrow exception, still POST /api/v1/generate-bet only, since the new path contains none of the forbidden route words; the exact-approved-operation-set check remains load-bearing over both paths. No catalog, CLI, frontend consumer, authentication, deployment, or cutover claim is made; legacy consumer migration remains a separate task. P605F Draft PR: https://github.com/kelvinhuang0327/MathStatisticalAnalysis/pull/17."
    },
